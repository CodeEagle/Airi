name: Update AIRI Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no new version"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Target upstream version/tag to build"
        required: false
        default: ""
        type: string
      publish_to_store:
        description: "Reserved for lzcat-trigger compatibility"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

env:
  UPSTREAM_REPO: moeru-ai/airi

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ inputs.target_version }}"

          if [ -n "$TARGET_VERSION" ]; then
            SOURCE_VERSION="$TARGET_VERSION"
          else
            SOURCE_VERSION="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq '.tag_name')"
          fi

          if [ -z "$SOURCE_VERSION" ] || [ "$SOURCE_VERSION" = "null" ]; then
            echo "Failed to resolve upstream version"
            exit 1
          fi

          BUILD_VERSION="$(printf '%s' "$SOURCE_VERSION" | sed -E 's/^v//; s/^([0-9]+\\.[0-9]+\\.[0-9]+).*/\\1/')"
          echo "source_version=$SOURCE_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check-update
        run: |
          CURRENT_SOURCE_VERSION="$(python3 - <<'PY'
          import json
          from pathlib import Path
          meta = Path('.lazycat-build.json')
          if not meta.exists():
              print('')
          else:
              try:
                  print(json.loads(meta.read_text()).get('source_version', ''))
              except Exception:
                  print('')
          PY
          )"
          CURRENT_IMAGE="$(python3 - <<'PY'
          import json
          from pathlib import Path
          meta = Path('.lazycat-build.json')
          if not meta.exists():
              print('')
          else:
              try:
                  print(json.loads(meta.read_text()).get('image', ''))
              except Exception:
                  print('')
          PY
          )"

          SOURCE_VERSION="${{ steps.version.outputs.source_version }}"

          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.target_version }}" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$CURRENT_IMAGE" ] || [[ "$CURRENT_IMAGE" == *"your-github-user"* ]]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ "$CURRENT_SOURCE_VERSION" != "$SOURCE_VERSION" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone upstream source
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          git clone --depth 1 --branch "${{ steps.version.outputs.source_version }}" "https://github.com/${UPSTREAM_REPO}.git" /tmp/airi-source
          cp Dockerfile /tmp/airi-source/Dockerfile.lazycat
          mkdir -p /tmp/airi-source/lazycat
          cp -R lazycat/. /tmp/airi-source/lazycat/

      - name: Build and push ghcr image
        if: steps.check-update.outputs.update_needed == 'true'
        id: build-image
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_VERSION="${{ steps.version.outputs.source_version }}"
          IMAGE="ghcr.io/${{ github.repository }}:${SOURCE_VERSION}"
          IMAGE="$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')"

          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          docker build -f /tmp/airi-source/Dockerfile.lazycat -t "$IMAGE" /tmp/airi-source
          docker push "$IMAGE"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Update build metadata
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          SOURCE_VERSION: ${{ steps.version.outputs.source_version }}
          BUILD_VERSION: ${{ steps.version.outputs.build_version }}
          IMAGE: ${{ steps.build-image.outputs.image }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
            "upstream_repo": "moeru-ai/airi",
            "source_version": os.environ["SOURCE_VERSION"],
            "build_version": os.environ["BUILD_VERSION"],
            "image": os.environ["IMAGE"],
            "notes": "Target repo workflow only builds and pushes the GHCR main image. lzcat-trigger handles copy-image, manifest rewrite, lpk build, release, and optional store publish."
          }
          Path(".lazycat-build.json").write_text(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Commit build metadata
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .lazycat-build.json

          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
            exit 0
          fi

          git commit -m "Record AIRI source image ${{ steps.version.outputs.source_version }}"
          git push origin HEAD:${GITHUB_REF_NAME}
